# Add this inside the `game.boobank.com { ... }` block in /etc/caddy/Caddyfile.
# Order matters — put this BEFORE the generic `handle_path /godot-pvp/*` static
# route so /godot-pvp/_logs is captured here and not 404'd by the static handler.

handle /godot-pvp/_logs {
    reverse_proxy localhost:7779
    # Strip the path prefix so the Python server sees a plain `/` request.
    # Caddy `handle` doesn't auto-strip; we don't need to since the server
    # ignores the path anyway.
}
